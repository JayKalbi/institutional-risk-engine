version: '3.8'

services:
  hybridcredit-risk-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybridcredit_llm_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
